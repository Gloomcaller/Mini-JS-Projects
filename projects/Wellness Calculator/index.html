<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="media/favicon32.png">
    <link rel="stylesheet" href="styles.css">
    <title>Wellness Dashboard</title>
</head>

<body>
    <div class="container">
        <h1>Wellness Dashboard</h1>

        <!-- Input form -->
        <div id="formSection">
            <div class="form-grid">
                <input type="text" id="username" placeholder="Your name">
                <input type="number" id="age" placeholder="Age" min="1" max="120">
                <select id="gender">
                    <option value="">Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
                <input type="number" id="height" placeholder="Height (cm)" min="50" max="300">
                <input type="number" id="weight" placeholder="Weight (kg)" min="10" max="500">
                <input type="number" id="bodyfat" placeholder="Body fat % (optional)" min="1" max="70">
                <input type="number" id="waist" placeholder="Waist (cm, optional)" min="30" max="300">
                <input type="number" id="hip" placeholder="Hip (cm, optional)" min="30" max="300">
                <select id="diet">
                    <option value="">Diet type</option>
                    <option value="omnivore">Omnivore</option>
                    <option value="vegetarian">Vegetarian</option>
                    <option value="vegan">Vegan</option>
                </select>
                <select id="activity">
                    <option value="">Activity level</option>
                    <option value="sedentary">Sedentary (little/no exercise)</option>
                    <option value="light">Light (1-3 days/week)</option>
                    <option value="moderate">Moderate (3-5 days/week)</option>
                    <option value="active">Active (6-7 days/week)</option>
                    <option value="very_active">Very active (athlete/physical job)</option>
                </select>
                <select id="goal">
                    <option value="">Goal</option>
                    <option value="lose">Lose weight</option>
                    <option value="maintain">Maintain weight</option>
                    <option value="gain">Gain weight</option>
                </select>
            </div>
            <button id="calcBtn">Calculate</button>
        </div>

        <!-- Results dashboard (hidden initially) -->
        <div id="resultSection" class="hidden">
            <p id="greeting"></p>

            <div class="metrics-grid" id="metrics"></div>

            <button id="newCalcBtn">New Calculation</button>

            <!-- History (last 7) -->
            <div id="history">
                <h3>Recent Calculations</h3>
                <div id="historyList"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>

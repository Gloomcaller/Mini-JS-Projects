<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="media/favicon32.png">
    <link rel="stylesheet" href="styles.css">
    <title>Tarot Reader</title>
</head>

<body>
    <div class="container">
        <h1>Tarot Reader</h1>

        <div id="intro">
            <p>Discover what the cards have in store for you.</p>
            <div class="form-group">
                <input type="text" id="username" placeholder="Enter your name" required>
                <input type="date" id="birthday" placeholder="Enter your birth date">
            </div>
            <button id="startBtn">Begin Reading</button>
        </div>

        <div id="readingSection" class="hidden">
            <p id="greeting"></p>

            <div class="spread-select">
                <button class="spread-btn active" data-cards="3">3-Card Spread</button>
                <button class="spread-btn" data-cards="5">5-Card Spread</button>
            </div>

            <div id="spread" class="hidden"></div>

            <div id="interpretation" class="hidden">
                <h3>Your Reading</h3>
                <p id="readingText"></p>
            </div>

            <button id="newReadingBtn" class="hidden">New Reading</button>

            <div id="history">
                <h3>Reading History</h3>
                <div id="historyList"></div>
                <button id="clearHistoryBtn" class="hidden">Clear History</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>

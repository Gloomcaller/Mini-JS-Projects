<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="media/favicon32.png">
    <link rel="stylesheet" href="styles.css">
    <title>Memory Game</title>
</head>

<body>
    <div class="game-container">
        <header>
            <h1>Memory Game</h1>
            <div class="score-bar">
                <span class="score-text">Score: <span id="result">0</span> / <span id="total-pairs">6</span></span>
                <button id="reset-btn">Reset</button>
            </div>
        </header>

        <main>
            <div id="grid"></div>
            <div id="win-message" class="hidden">
                <h2>Congratulations!</h2>
                <p>You found all matches in <span id="moves-count">0</span> moves!</p>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>

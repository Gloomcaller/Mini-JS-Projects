<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="media/favicon32.png">
    <link rel="stylesheet" href="styles.css">
    <title>Dice Roller</title>
</head>

<body>
    <div id="container">
        <header>
            <img src="media/dice-shield.png" alt="Dice Roller Logo" id="logo">
            <h1>Dice Roller</h1>
        </header>
        <label for="numOfDice">Number of Dice (1–36)</label>
        <input type="number" id="numOfDice" placeholder="6" value="6" min="1" max="36">
        <div class="button-row">
            <button id="roll-btn">Roll Dice</button>
            <button id="clear-btn">Clear Dice</button>
        </div>
        <div id="diceResult"></div>
        <div id="diceSum"></div>
        <div id="diceImages"></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
